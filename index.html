<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الرياضيات للأقسام النهائية</title>
    <style>
        /* 2. ضبط الهوامش الأساسية لتشمل كل الصفحة */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            line-height: 1.6; 
            margin: 0; /* إلغاء هوامش المتصفح الافتراضية */
            padding: 10px; /* هامش بسيط جداً من الحواف */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3. جعل الحاوية تشغل العرض بالكامل مع هوامش جانبية أنيقة */
        .container { 
            width: 100%; /* العرض الكامل */
            max-width: 600px; /* حد أقصى للحفاظ على التناسق على الشاشات الكبيرة */
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            box-sizing: border-box; /* لضمان أن الـ padding لا يزيد العرض */
        }

        /* تنسيق العناوين والفقرات لتكون أوضح */
        h1 { color: #1a73e8; font-size: 1.5rem; text-align: center; margin-bottom: 20px; }
        h3 { color: #333; font-size: 1.2rem; margin-top: 0; }
        p { font-size: 1rem; color: #555; }

        /* صندوق التمرين */
        .exercise-box { 
            border-right: 5px solid #34a853; 
            background: #f9fff9; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 8px;
        }

        /* تنسيق حقل الإدخال ليكون كبيراً وسهل اللمس */
        input { 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            width: 100%; /* ملء عرض الحاوية */
            font-size: 1.1rem;
            margin-bottom: 15px;
            box-sizing: border-box; 
        }
        input:focus { border-color: #1a73e8; outline: none; }

        /* تنسيق الزر ليكون عريضاً وسهل الضغط */
        button { 
            padding: 12px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1rem;
            width: 100%; /* ملء عرض الحاوية */
            transition: background 0.2s;
        }
        button:hover { background: #1557b0; }

        /* تنسيق النتيجة */
        #result { 
            margin-top: 15px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 1.1rem;
            min-height: 1.6em; /* الحفاظ على المساحة حتى لو كانت فارغة */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Final Year Mathematics</h1>
    
    <div class="exercise-box">
        <h3>Exercise 01: Numerical Sequences</h3>
        <p>Let (U<sub>n</sub>) be an arithmetic sequence where U<sub>0</sub> = 10 and the common difference d = 5.</p>
        <p><strong>Calculate the value of U<sub>4</sub>?</strong></p>
        
        <input type="number" id="ans" placeholder="Enter your answer...">
        <button onclick="verify()">Submit Answer</button>
        <p id="result"></p>
    </div>
</div>

<script>
    function verify() {
        const a = document.getElementById('ans').value;
        const res = document.getElementById('result');
        // Formula: U4 = U0 + 4*d = 10 + (4 * 5) = 10 + 20 = 30
        if(a == 30) {
            res.style.color = "#2e7d32";
            res.innerHTML = "🎉 Correct! Formula: U₄ = 10 + (4 × 5) = 30.";
        } else if (a == "") {
            res.style.color = "#888";
            res.innerHTML = "Please enter a number.";
        } else {
            res.style.color = "#d93025";
            res.innerHTML = "❌ Try again. Hint: Uₙ = U₀ + n × d";
        }
    }
</script>

</body>
</html>
