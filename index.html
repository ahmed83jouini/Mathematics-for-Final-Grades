<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الرياضيات التفاعلية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .hero-section { background: white; padding: 40px 20px; border-bottom: 2px solid #e9ecef; margin-bottom: 30px; }
        .accordion-button:not(.collapsed) { background-color: #e8f0fe; color: #1a73e8; }
        .accordion-button:focus { border-color: #1a73e8; box-shadow: 0 0 0 0.25rem rgba(26, 115, 232, 0.25); }
    </style>
</head>
<body>

<div class="hero-section text-center shadow-sm">
    <h1 class="display-6 fw-bold text-primary">الرياضيات للأقسام النهائية</h1>
    <p class="text-secondary">بوابة تفاعلية للتعلم الذكي والتدريب المستمر</p>
</div>

<div class="container" style="max-width: 700px;">
    <div class="accordion shadow-sm" id="mathPortal">
        
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#algebra">
                    📦 محور الجبر.
                </button>
            </h2>
            <div id="algebra" class="accordion-collapse collapse show" data-bs-parent="#mathPortal">
                <div class="accordion-body">
                    <div class="list-group list-group-flush">
                        <a href="Algebra/lesson1.html" class="list-group-item list-group-item-action border-0">🔢 المتتاليات العددية</a>
                        <a href="#" class="list-group-item list-group-item-action border-0">♾️ الأعداد المركبة</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#analysis">
                    📈 محور التحليل
                </button>
            </h2>
            <div id="analysis" class="accordion-collapse collapse" data-bs-parent="#mathPortal">
                <div class="accordion-body">
                    <div class="list-group list-group-flush">
                        <a href="#" class="list-group-item list-group-item-action border-0">📉 الدوال اللوغاريتمية والأسية</a>
                        <a href="#" class="list-group-item list-group-item-action border-0">∫ الحساب التكاملي</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#prob">
                    🎲 الاحتمالات والإحصاء
                </button>
            </h2>
            <div id="prob" class="accordion-collapse collapse" data-bs-parent="#mathPortal">
                <div class="accordion-body">
                    <div class="list-group list-group-flush">
                        <a href="#" class="list-group-item list-group-item-action border-0">📊 الاحتمالات الشرطية</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
