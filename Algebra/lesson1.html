<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرياضيات للأقسام النهائية</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<div class="container">
    <div class="card main-card p-4">
        <h1 class="text-primary text-center h4 mb-4 border-bottom pb-2">الرياضيات للأقسام النهائية</h1>
        
        <div id="exercise-1" class="exercise-box">
            <h5 class="fw-bold">التمرين الأول: المتتاليات العددية</h5>
            <p>لتكن المتتالية الحسابية <span class="math-text">(U<sub>n</sub>)</span> حيث <span class="math-text">U<sub>0</sub> = 10</span> والأساس <span class="math-text">d = 5</span>.</p>
            <p class="fw-bold">أحسب قيمة الحد <span class="math-text">U<sub>4</sub></span> ؟</p>
            
            <input type="number" id="ans" class="form-control form-control-lg text-center mb-3" placeholder="أدخل إجابتك هنا...">
            <button onclick="verify()" class="btn btn-primary btn-lg w-100">تحقق من الإجابة</button>
            <div id="result" class="mt-3 text-center fw-bold"></div>
        </div>
    </div>
</div>

<script>
    function verify() {
        const a = document.getElementById('ans').value;
        const res = document.getElementById('result');
        if(a == 30) {
            res.className = "mt-3 text-center fw-bold correct-answer";
            res.innerHTML = "🎉 إجابة صحيحة! المنطق سليم.";
        } else {
            res.className = "mt-3 text-center fw-bold wrong-answer";
            res.innerHTML = "❌ حاول مرة أخرى.";
        }
    }
</script>

</body>
</html>
